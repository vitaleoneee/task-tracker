{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register{% endblock %}

{% block content %}
    <div class="container">
        <div class="d-flex flex-column align-items-center justify-content-center min-vh-100">
            <form method="post" class="register-form">
                {% csrf_token %}
                <legend class="mb-4 text-center fs-1 fw-bold register-title">
                    Register
                </legend>
                {{ form|crispy }}
                <button type="submit" class="btn btn-light w-100 mt-2 register-btn">
                    Create Account
                </button>
            </form>
        </div>
    </div>
{% endblock content %}
