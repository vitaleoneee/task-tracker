<form hx-post="{% url 'tracker:add_task' project.id %}">
    {% csrf_token %}
    <div class="row g-2 align-items-center px-3 py-2">
        <div class="col-auto d-none d-md-block">
            <i class="bi bi-plus-lg text-success fs-4"></i>
        </div>

        <div class="col-12 col-md">
            <input type="text" class="form-control {% if form.title.errors %}is-invalid{% endif %}"
                   name="title" placeholder="Start typing here to create a task...">
        </div>

        <div class="col-12 col-md-auto">
            <input type="datetime-local" class="form-control" name="due_date">
        </div>

        <div class="col-12 d-md-none">
            <div class="d-flex gap-2 justify-content-between">
                <input type="radio" class="btn-check" name="priority" id="p1" value="1" checked>
                <label class="btn btn-outline-secondary btn-sm" for="p1">Low</label>

                <input type="radio" class="btn-check" name="priority" id="p2" value="2">
                <label class="btn btn-outline-secondary btn-sm" for="p2">Medium</label>

                <input type="radio" class="btn-check" name="priority" id="p3" value="3">
                <label class="btn btn-outline-secondary btn-sm" for="p3">High</label>

                <input type="radio" class="btn-check" name="priority" id="p4" value="4">
                <label class="btn btn-outline-secondary btn-sm" for="p4">Critical</label>
            </div>
        </div>

        <div class="col-12 col-md-auto d-none d-md-block">
            <select class="form-select" name="priority">
                <option value="1">Low</option>
                <option value="2">Medium</option>
                <option value="3">High</option>
                <option value="4">Critical</option>
            </select>
        </div>

        <div class="col-12 col-md-auto">
            <button type="submit" class="btn btn-success w-100 w-md-auto">Add Task</button>
        </div>

    </div>
</form>
