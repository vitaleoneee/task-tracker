<form class="w-100 p-2">
    {% csrf_token %}
    <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2">
        <div class="d-flex flex-column flex-md-row gap-2 w-100">
            <input type="text"
                   class="form-control {% if form.title.errors %}is-invalid{% endif %}"
                   name="title"
                   value="{{ task.title }}">
            <input type="datetime-local"
                   class="form-control"
                   name="due_date">
        </div>
        <div class="d-flex gap-1 justify-content-between justify-content-lg-start flex-shrink-0 flex-wrap">
            <input type="radio" class="btn-check" name="priority" id="p1-{{ task.id }}" value="1" checked>
            <label class="btn btn-outline-secondary btn-sm" for="p1-{{ task.id }}">Low</label>

            <input type="radio" class="btn-check" name="priority" id="p2-{{ task.id }}" value="2">
            <label class="btn btn-outline-secondary btn-sm" for="p2-{{ task.id }}">Medium</label>

            <input type="radio" class="btn-check" name="priority" id="p3-{{ task.id }}" value="3">
            <label class="btn btn-outline-secondary btn-sm" for="p3-{{ task.id }}">High</label>

            <input type="radio" class="btn-check" name="priority" id="p4-{{ task.id }}" value="4">
            <label class="btn btn-outline-secondary btn-sm" for="p4-{{ task.id }}">Critical</label>

            <button type="submit" class="btn btn-success btn-sm ms-2">
                <i class="bi bi-check-lg"></i>
            </button>
            <button type="button" class="btn btn-danger btn-sm ms-1">
                <i class="bi bi-x"></i>
            </button>
        </div>
    </div>
</form>
